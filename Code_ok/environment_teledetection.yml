name: teledetection

# ═══════════════════════════════════════════════════════════════════════════════
# GUIDE D'INSTALLATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MÉTHODE 1 — CONDA  (RECOMMANDÉE — tu as Miniconda installé)               ║
# ║  Gère GDAL, eccodes, ISCE2, openjdk automatiquement                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ── Prérequis ────────────────────────────────────────────────────────────────
#   Miniconda ou Anaconda installé :
#     https://docs.conda.io/en/latest/miniconda.html
#
# ── 1. Créer l'environnement d'un seul coup ───────────────────────────────────
#
#   conda env create -f environment_teledetection.yml
#
#   → Installe automatiquement TOUS les paquets conda + pip (15-45 min)
#
# ── 2. Activer ────────────────────────────────────────────────────────────────
#
#   conda activate teledetection
#
# ── 3. Vérifier ───────────────────────────────────────────────────────────────
#
#   python -c "import numpy, xarray, rasterio, mintpy, torch; print('OK')"
#
# ── 4. Désactiver ─────────────────────────────────────────────────────────────
#
#   conda deactivate
#
# ── 5. Mettre à jour si ce fichier change ────────────────────────────────────
#
#   conda env update -f environment_teledetection.yml --prune
#
# ── 6. Supprimer l'environnement ─────────────────────────────────────────────
#
#   conda env remove -n teledetection
#
# ── 7. Enregistrer comme kernel Jupyter ──────────────────────────────────────
#
#   conda activate teledetection
#   python -m ipykernel install --user --name teledetection \
#                               --display-name "Python (teledetection)"
#
# ── 8. Exporter l'environnement actuel (après ajouts manuels) ────────────────
#
#   conda env export > environment_teledetection_export.yml
#
# ── Sans GPU NVIDIA ───────────────────────────────────────────────────────────
#   Supprimer les 2 lignes marquées [GPU] avant de lancer la création :
#     - pytorch::pytorch-cuda=12.1
#     - cudatoolkit=12.1
#
#
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MÉTHODE 2 — VENV + PIP  (sans conda, Python système requis)               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ── Prérequis ────────────────────────────────────────────────────────────────
#   Python 3.11 + libs système :
#     Linux   : sudo apt install python3.11 python3.11-venv python3.11-dev \
#                 libgdal-dev libeccodes-dev libjpeg-dev libproj-dev \
#                 libgeos-dev libspatialindex-dev default-jdk
#     Windows : https://www.python.org/downloads/release/python-3119/
#
# ── 1. Créer l'environnement virtuel ──────────────────────────────────────────
#
#   python3.11 -m venv teledetection
#
# ── 2. Activer ────────────────────────────────────────────────────────────────
#
#   Linux / macOS : source teledetection/bin/activate
#   Windows PS    : teledetection\Scripts\Activate.ps1
#   Windows cmd   : teledetection\Scripts\activate.bat
#
# ── 3. Mettre à jour pip ─────────────────────────────────────────────────────
#
#   pip install --upgrade pip setuptools wheel
#
# ── 4. Extraire les paquets pip du .yml et installer ─────────────────────────
#
#   python3 -c "
#   import yaml, sys
#   with open('environment_teledetection.yml') as f:
#       env = yaml.safe_load(f)
#   pkgs = next(
#       item['pip'] for item in env['dependencies']
#       if isinstance(item, dict) and 'pip' in item
#   )
#   open('requirements.txt','w').write('\n'.join(pkgs))
#   print(f'{len(pkgs)} paquets extraits dans requirements.txt')
#   "
#   pip install -r requirements.txt
#
# ── 5. Désactiver ─────────────────────────────────────────────────────────────
#
#   deactivate
#
# ── 6. Supprimer ──────────────────────────────────────────────────────────────
#
#   rm -rf teledetection/          (Linux/macOS)
#   rmdir /s /q teledetection      (Windows cmd)
#
# ── 7. Enregistrer comme kernel Jupyter ──────────────────────────────────────
#
#   pip install ipykernel
#   python -m ipykernel install --user --name teledetection \
#                               --display-name "Python (teledetection)"
#
# ── 8. Exporter l'environnement actuel ───────────────────────────────────────
#
#   pip freeze > requirements_export.txt
#
# ── NOTE venv ─────────────────────────────────────────────────────────────────
#   Les sections conda du .yml (GDAL, eccodes, ISCE2, openjdk, jpy) ne sont
#   PAS installées par pip ; il faut les compiler depuis les libs système.
#   Utiliser conda reste fortement conseillé pour cet environnement.










# ═══════════════════════════════════════════════════════════════════════════════
# RÉSUMÉ DES CHOIX DE VERSIONS — CONFLITS RÉSOLUS
#
#  Python 3.11     : support maximal (PyTorch 2.1, TF 2.15, MintPy 1.5,
#                    isce2, scikit-learn 1.3+). Python 3.12/3.14 non supporté
#                    par ISCE2 conda-forge et TensorFlow <3.0.
#
#  numpy 1.26.x    : numpy 2.x casse MintPy, albumentations, pyrate-insar,
#                    spectral, pyrocko et la majorité des outils SAR/InSAR.
#
#  GDAL 3.8.x      : compatible rasterio 1.3.x, fiona 1.9.x, ISCE2 conda-forge.
#                    GDAL 3.9+ peut briser isce2 ; ne pas upgrader seul.
#
#  CUDA 12.1       : compatible PyTorch 2.1.0 ET TensorFlow 2.15.x.
#                    CUDA 11.8 trop vieux pour TF 2.14+.
#
#  cdsapi / eccodes / cfgrib / rioxarray : conda-forge UNIQUEMENT
#                    → supprimer leurs doublons pip évite les conflits de .so
#
#  urllib3 <3.0    : ecmwf-api-client et certains clients HTTP cassent avec >=3.0
#
#  intake <2.0     : intake-esm et intake-xarray incompatibles avec intake 2.x
#
#  GPU OPTIONNEL   : supprimer les lignes marquées [GPU] si pas de NVIDIA
# ═══════════════════════════════════════════════════════════════════════════════

channels:
  - conda-forge
  - pytorch
  - defaults

