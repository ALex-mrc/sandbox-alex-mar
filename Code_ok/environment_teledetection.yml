# ═══════════════════════════════════════════════════════════════════════════════
# DONNÉES & FORMATS COUVERTS
#   ERA5 / ERA5-Land  → cdsapi (conda), herbie-data, cfgrib, eccodes, pygrib
#   SMAP L2/L3/L4     → smap-io, earthaccess, pyhdf
#   SMOS              → earthaccess
#   ISMN in-situ      → ismn, pytesmo
#   ASCAT Metop       → ascat, pytesmo
#   MODIS LST/NDVI    → earthaccess, pyhdf, hdstats
#   CMIP5/6           → intake-esm, xarray, cf_xarray
#   GPM / TRMM        → earthaccess, pydap
#   GRACE / GRACE-FO  → earthaccess, pydap
#   NetCDF (.nc)      → netcdf4, xarray, h5netcdf, rioxarray, cf_xarray, cftime
#   HDF4              → pyhdf
#   HDF5              → h5py, h5netcdf, h5pyd, tables
#   GRIB2             → cfgrib, pygrib, eccodes  (tous via conda-forge)
#   GeoTIFF / COG     → gdal, rasterio, rio-cogeo
#   Sentinel-1 SLC    → xarray-sentinel, sarsen, pyrosar, isce2, snap2stamps
#
